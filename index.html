<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球花卉产业辐射与定价权 · 交互地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #F7F0F2; }

  #map { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }

  /* ====== 配色系统：低饱和粉玫渐变 (来自 LaTeX 色板) ======
     PKbg:       #F7F0F2  底图底色
     PKboundary: #C4B0B6  边界线
     PKlevelA:   #F0DCE2  L1 最浅
     PKlevelB:   #E2C4CC  L2 浅
     PKlevelC:   #D0A4B0  L3 中浅
     PKlevelD:   #BC8090  L4 中
     PKlevelE:   #A8586C  L5 中深/玫粉
     PKlevelF:   #943850  L6 深玫粉 (最高级/核心)
     PKaccent:   #802838  最深强调
     PKlink:     #C08090  OD连线
  */

  /* ---- 顶部标题栏 ---- */
  .title-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(135deg, rgba(148,56,80,0.94) 0%, rgba(128,40,56,0.96) 100%);
    color: #fff; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px rgba(128,40,56,0.35);
    pointer-events: auto;
  }
  .title-bar h1 { font-size: 1.3em; font-weight: 600; letter-spacing: 2px; }
  .title-bar .subtitle { font-size: 0.8em; opacity: 0.85; margin-left: 12px; color: #E2C4CC; }

  /* ---- 图层面板 ---- */
  .layer-panel {
    position: absolute; top: 80px; right: 12px; z-index: 1000;
    background: rgba(255,255,255,0.96); border-radius: 10px;
    padding: 14px 18px; box-shadow: 0 4px 20px rgba(128,40,56,0.12);
    min-width: 210px; font-size: 14px;
    pointer-events: auto; border: 1px solid #E8CCD4;
  }
  .layer-panel h3 { font-size: 15px; margin-bottom: 10px; color: #802838; border-bottom: 1px solid #F0DCE2; padding-bottom: 6px; }
  .layer-panel label { display: flex; align-items: center; padding: 5px 0; cursor: pointer; gap: 8px; color: #8C3444; }
  .layer-panel label:hover { color: #802838; }
  .layer-panel input[type="checkbox"] { accent-color: #943850; width: 16px; height: 16px; }
  .layer-dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; flex-shrink: 0; }
  .layer-dot.circle { border-radius: 50%; }

  /* ---- 图例面板 ---- */
  .legend-panel {
    position: absolute; bottom: 30px; left: 12px; z-index: 1000;
    background: rgba(255,255,255,0.96); border-radius: 10px;
    padding: 12px 16px; box-shadow: 0 4px 20px rgba(128,40,56,0.12);
    font-size: 13px; pointer-events: auto;
    border: 1px solid #E8CCD4;
    display: none;
  }
  .legend-panel.visible { display: block; }
  .legend-panel h4 { margin-bottom: 8px; color: #802838; font-size: 13px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; color: #666; }
  .legend-swatch { width: 22px; height: 15px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
  .legend-swatch.circle { width: 13px; height: 13px; border-radius: 50%; margin: 0 4px; border: none; }
  .legend-swatch.star { font-size: 16px; line-height: 1; flex-shrink: 0; margin: 0 0px; }
  .legend-line { width: 28px; height: 0; flex-shrink: 0; border-radius: 1px; }

  /* ---- 弹窗 ---- */
  .leaflet-popup-content-wrapper {
    border-radius: 8px; box-shadow: 0 3px 14px rgba(128,40,56,0.18);
    border: 1px solid #E2C4CC;
  }
  .leaflet-popup-content { font-size: 13px; line-height: 1.6; margin: 8px 12px; color: #666; }
  .leaflet-popup-content strong { color: #943850; }

  /* ---- Tooltip ---- */
  .leaflet-tooltip {
    background: rgba(255,255,255,0.96); border: 1px solid #E2C4CC; border-radius: 6px;
    padding: 6px 10px; box-shadow: 0 2px 8px rgba(128,40,56,0.12);
    font-size: 12px; line-height: 1.5; color: #666;
  }
  .leaflet-tooltip strong { color: #943850; }

  /* ---- 发射脉冲动画 ---- */
  @keyframes pulseRing {
    0%   { transform: scale(0.3); opacity: 0.9; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes pulseRing2 {
    0%   { transform: scale(0.3); opacity: 0.7; }
    100% { transform: scale(2.0); opacity: 0; }
  }
  @keyframes flowDash {
    to { stroke-dashoffset: -28; }
  }
  .od-flow {
    animation: flowDash 1.5s linear infinite;
  }

  /* 脉冲圈 */
  .pulse-ring {
    position: absolute;
    border: 2px solid #943850;
    border-radius: 50%;
    animation: pulseRing 2.5s ease-out infinite;
    pointer-events: none;
    z-index: 10000;
  }
  .pulse-ring:nth-child(2) {
    animation: pulseRing2 2.5s ease-out 1.2s infinite;
    border-color: #BC8090;
  }
  .info-bar {
    position: absolute; bottom: 12px; right: 12px; z-index: 1000;
    background: rgba(128,40,56,0.78); color: #F7F0F2; border-radius: 6px;
    padding: 6px 14px; font-size: 11px; pointer-events: none;
  }

  @media (max-width: 640px) {
    .title-bar h1 { font-size: 1em; }
    .layer-panel { top: 60px; right: 6px; padding: 10px 12px; min-width: 170px; font-size: 12px; }
    .legend-panel { bottom: 10px; left: 6px; font-size: 11px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="title-bar">
  <div>
    <h1>🌸 全球花卉产业辐射与定价权</h1>
    <span class="subtitle">Flower Industry Global Radiation &amp; Pricing Power — 低饱和粉玫色系</span>
  </div>
</div>

<div class="layer-panel" id="layerPanel">
  <h3>🗺️ 图层控制</h3>
  <label><input type="checkbox" id="toggleIDW" checked> <span class="layer-dot" style="background:#D0A4B0;"></span> 辐射密度面 (IDW插值)</label>
  <label><input type="checkbox" id="toggleKDE"> <span class="layer-dot" style="background:#BC8090;"></span> 核密度分析</label>
  <label><input type="checkbox" id="toggleOD" checked> <span class="layer-dot" style="background:#C08090;"></span> 贸易网络线 (OD)</label>
  <label><input type="checkbox" id="toggleTier" checked> <span class="layer-dot circle" style="background:#943850;"></span> 定价权等级点</label>
  <label style="margin-top:6px;border-top:1px solid #F0DCE2;padding-top:6px;"><input type="checkbox" id="toggleLabels" checked> 🏷️ 显示市场名称标注</label>
</div>

<!-- IDW 辐射密度图例 -->
<div class="legend-panel visible" id="legendIDW">
  <h4>📊 辐射密度等级 (IDW插值)</h4>
  <div class="legend-row"><span class="legend-swatch" style="background:#F0DCE2;"></span> 等级1 — 低密度</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#E2C4CC;"></span> 等级2</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#D0A4B0;"></span> 等级3</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#BC8090;"></span> 等级4 — 高密度</div>
</div>

<!-- 核密度图例 -->
<div class="legend-panel" id="legendKDE">
  <h4>🔬 核密度分析</h4>
  <div class="legend-row"><span class="legend-swatch" style="background:#F0DCE2;"></span> 等级1</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#E2C4CC;"></span> 等级2</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#D0A4B0;"></span> 等级3</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#BC8090;"></span> 等级4</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#943850;"></span> 等级5 — 最高密度</div>
</div>

<!-- OD网络图例 -->
<div class="legend-panel visible" id="legendOD">
  <h4>🔗 贸易流量分级 (OD网络)</h4>
  <div class="legend-row"><span class="legend-line" style="border-top:1px solid #E2C4CC;"></span> 1级 — 低流量</div>
  <div class="legend-row"><span class="legend-line" style="border-top:1.5px solid #D0A4B0;"></span> 2级</div>
  <div class="legend-row"><span class="legend-line" style="border-top:2px solid #BC8090;"></span> 3级</div>
  <div class="legend-row"><span class="legend-line" style="border-top:2.5px solid #A8586C;"></span> 4级</div>
  <div class="legend-row"><span class="legend-line" style="border-top:3px solid #943850;"></span> 5级 — 高流量</div>
</div>

<!-- 定价权图例 -->
<div class="legend-panel visible" id="legendTier">
  <h4>⭐ 定价权等级</h4>
  <div class="legend-row"><span class="legend-swatch circle" style="background:#943850;width:16px;height:16px;"></span> 核心枢纽 ★</div>
  <div class="legend-row"><span class="legend-swatch circle" style="background:#BC8090;width:13px;height:13px;"></span> 区域中心 ●</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#E2C4CC;width:11px;height:11px;border-radius:1px;"></span> 分销节点 ■</div>
</div>

<div class="info-bar" id="infoBar">要素加载中…</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ======================== 配色方案 (LaTeX §1.2 色板) ========================
const PK = {
  bg:       '#F7F0F2',
  boundary: '#C4B0B6',
  levelA:   '#F0DCE2',
  levelB:   '#E2C4CC',
  levelC:   '#D0A4B0',
  levelD:   '#BC8090',
  levelE:   '#A8586C',
  levelF:   '#943850',
  accent:   '#802838',
  link:     '#C08090',
};

const IDW_COLORS = [PK.levelA, PK.levelB, PK.levelC, PK.levelD];      // L1-L4
const KDE_COLORS = [PK.levelA, PK.levelB, PK.levelC, PK.levelD, PK.levelE, PK.levelF]; // L1-L6

// OD线: Jenks 5级 (按 volume_sim)
const OD_CLASSES = [
  { max: 1000,  color: PK.levelB, weight: 0.8, opacity: 0.30 },
  { max: 3000,  color: PK.levelC, weight: 1.2, opacity: 0.30 },
  { max: 6000,  color: PK.levelD, weight: 1.8, opacity: 0.28 },
  { max: 9000,  color: PK.levelE, weight: 2.2, opacity: 0.25 },
  { max: Infinity, color: PK.levelF, weight: 2.8, opacity: 0.22 },
];

// 定价权: 3级唯一值
const TIER_STYLE = {
  '核心枢纽': { radius: 10, color: PK.levelF, weight: 2.5, fillOpacity: 0.90 },
  '区域中心': { radius: 7,  color: PK.levelD, weight: 2.0, fillOpacity: 0.85 },
  '分销节点': { radius: 5,  color: PK.levelB, weight: 1.5, fillOpacity: 0.80 },
};
const TIER_DEFAULT = { radius: 6, color: PK.levelC, weight: 1.5, fillOpacity: 0.80 };

// 斗南中心星标 (如果有)
const DOUNAN_COORDS = [24.899, 102.783];

// ======================== 基础底图 ========================
const map = L.map('map', {
  center: [30, 104],
  zoom: 5,
  minZoom: 2,
  maxZoom: 18,
  zoomControl: true,
});

// 纯色底图：匹配 LaTeX PKbg #F7F0F2，不加载任何瓦片底图
map.getContainer().style.background = '#F7F0F2';

// 如需瓦片底图，取消下面注释：
// const TK = 'e696c81b7abf0913a31c44ecaf2a34d4';
// const tdtVec = L.tileLayer('http://t{s}.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=' + TK, { subdomains: ['0','1','2','3','4','5','6','7'], maxZoom: 18 });
// const tdtCva = L.tileLayer('http://t{s}.tianditu.gov.cn/DataServer?T=cva_w&x={x}&y={y}&l={z}&tk=' + TK, { subdomains: ['0','1','2','3','4','5','6','7'], maxZoom: 18 });
// L.layerGroup([tdtVec, tdtCva]).addTo(map);

// ======================== 图层容器 ========================
const layerGroups = {};
const allLabels = L.layerGroup().addTo(map);

// ======================== 样式函数 ========================
function styleIDW(feature) {
  const level = (feature.properties.level || 1) - 1;
  const idx = Math.min(level, IDW_COLORS.length - 1);
  return {
    fillColor: IDW_COLORS[idx],
    fillOpacity: 0.40,
    color: IDW_COLORS[idx],
    weight: 1.0,
    opacity: 0.55,
  };
}

function styleKDE(feature) {
  const level = (feature.properties.level || 1) - 1;
  const idx = Math.min(level, KDE_COLORS.length - 1);
  return {
    fillColor: KDE_COLORS[idx],
    fillOpacity: 0.45,
    color: KDE_COLORS[Math.min(idx + 1, KDE_COLORS.length - 1)],
    weight: 1.2,
    opacity: 0.60,
  };
}

function styleOD(feature) {
  const vol = feature.properties.volume || 0;
  for (const cls of OD_CLASSES) {
    if (vol <= cls.max) {
      return {
        color: cls.color, weight: cls.weight, opacity: cls.opacity,
        dashArray: '8 6',
      };
    }
  }
  return { color: PK.levelB, weight: 0.5, opacity: 0.25, dashArray: '6 8' };
}

// OD线流动动画
function animateODLines(layer) {
  layer.eachLayer(function(l) {
    if (l._path) {
      l._path.classList.add('od-flow');
    }
  });
}

function styleTier(feature) {
  const tl = feature.properties.tier_label || '';
  const style = TIER_STYLE[tl] || TIER_DEFAULT;
  return {
    radius: style.radius,
    fillColor: style.color,
    color: '#fff',
    weight: style.weight,
    fillOpacity: style.fillOpacity,
  };
}

// ======================== Popup / Tooltip ========================
function bindIDW(feature, layer) {
  const p = feature.properties;
  layer.bindTooltip(
    `<strong>${p.label || ''}</strong><br>密度阈值: ${typeof p.density_th === 'number' ? p.density_th.toExponential(4) : '-'}<br>等级: ${p.level}`,
    { direction: 'top', sticky: true }
  );
}

function bindKDE(feature, layer) {
  const p = feature.properties;
  layer.bindTooltip(
    `<strong>${p.label || ''}</strong><br>密度阈值: ${typeof p.density_th === 'number' ? p.density_th.toExponential(4) : '-'}<br>等级: ${p.level}`,
    { direction: 'top', sticky: true }
  );
}

function bindOD(feature, layer) {
  const p = feature.properties;
  const vol = typeof p.volume === 'number' ? p.volume.toLocaleString() : '-';
  const expVal = typeof p.export_value === 'number' && p.export_value > 0
    ? `<br>📊 ${p.country || ''}鲜切花出口额: ${p.export_value.toFixed(0)} 万美元 (2020)`
    : (p.country && p.country !== '中国' ? `<br>📊 ${p.country || ''}` : '');
  layer.bindTooltip(
    `<strong>${p.dest_name || ''}</strong><br>🏙️ ${p.dest_city || ''} · ${p.country || ''}<br>📏 ${typeof p.distance_k === 'number' ? p.distance_k.toFixed(1) : '-'} km<br>📦 交易流量: ${vol}${expVal}`,
    { direction: 'top', sticky: true }
  );
}

function bindTier(feature, layer) {
  const p = feature.properties;
  const tl = p.tier_label || p.tier || '';
  const starIcon = tl === '核心枢纽' ? '★ ' : '';
  layer.bindPopup(
    `<strong style="font-size:15px;">${starIcon}${p.name || ''}</strong>
     <em style="color:#A8586C;">${p.name_en || ''}</em><br><br>
     📍 ${p.city || ''}, ${p.country || ''}<br>
     🏷️ ${p.type || ''}<br>
     ⭐ 等级: <strong style="color:#943850;">${tl}</strong><br>
     📝 ${p.note || ''}`,
    { maxWidth: 300 }
  );
}

// ======================== 标注层 ========================
function createLabels(geojson) {
  geojson.features.forEach(f => {
    if (!f.properties.name) return;
    const geom = f.geometry;
    if (!geom) return;
    let latlng;
    if (geom.type === 'Point') {
      latlng = [geom.coordinates[1], geom.coordinates[0]];
    } else {
      return;
    }
    const label = L.marker(latlng, {
      icon: L.divIcon({
        className: 'leaflet-label',
        html: `<div style="font-size:10px;color:#802838;text-shadow:0 0 4px #F7F0F2,0 0 4px #fff;white-space:nowrap;font-weight:600;pointer-events:none;">${f.properties.name}</div>`,
        iconAnchor: [-10, 8],
      }),
      interactive: false,
    });
    allLabels.addLayer(label);
  });
}

// 斗南中心星标
function addDounanStar() {
  const starIcon = L.divIcon({
    className: '',
    html: `<div style="font-size:22px;color:#802838;text-shadow:0 0 6px #F7F0F2,0 0 2px gold;filter:drop-shadow(0 0 3px gold);">★</div>`,
    iconAnchor: [11, 11],
  });
  L.marker(DOUNAN_COORDS, { icon: starIcon, zIndexOffset: 9999 })
    .bindTooltip('<strong style="color:#802838;">斗南花拍中心 (KIFA)</strong><br>2024年交易量: 25.27亿支<br>亚洲第一、世界第二大鲜切花拍卖市场<br><small style="color:#999;">数据来源: KIFA大数据, 2025</small>', { direction: 'top' })
    .addTo(map);

  // 发射脉冲圈
  const PulseOverlay = L.Layer.extend({
    onAdd: function() {
      const pane = this._pane = document.createElement('div');
      pane.style.position = 'absolute';
      pane.style.pointerEvents = 'none';
      pane.style.zIndex = '9998';
      this.getPane('overlayPane').appendChild(pane);

      const r1 = document.createElement('div');
      r1.className = 'pulse-ring';
      r1.style.width = '60px'; r1.style.height = '60px';
      r1.style.marginLeft = '-30px'; r1.style.marginTop = '-30px';
      pane.appendChild(r1);

      const r2 = document.createElement('div');
      r2.className = 'pulse-ring';
      r2.style.width = '60px'; r2.style.height = '60px';
      r2.style.marginLeft = '-30px'; r2.style.marginTop = '-30px';
      pane.appendChild(r2);

      this._update = () => {
        const pt = map.latLngToContainerPoint(DOUNAN_COORDS);
        pane.style.left = pt.x + 'px';
        pane.style.top = pt.y + 'px';
      };
      map.on('move zoom', this._update);
      this._update();
    },
    onRemove: function() {
      map.off('move zoom', this._update);
    }
  });
  new PulseOverlay().addTo(map);
}

// ======================== 主加载 ========================
async function init() {
  const base = 'geojson/';

  // --- 底图：大洲面 (PKbg填充 + PKboundary描边) ---
  let continentLayer = L.layerGroup();
  try {
    const continentData = await loadJSON(base + 'continent.geojson');
    continentLayer = L.geoJSON(continentData, {
      style: { fillColor: PK.bg, fillOpacity: 1, color: PK.boundary, weight: 0.6, opacity: 0.7 },
      interactive: false,
    });
  } catch(e) { console.warn('大洲加载失败:', e); }
  continentLayer.addTo(map);

  // --- 底图：中国国界 ---
  let bountLayer = L.layerGroup();
  try {
    const bountData = await loadJSON(base + 'bount_arc.geojson');
    bountLayer = L.geoJSON(bountData, {
      style: { color: PK.boundary, weight: 1.0, opacity: 0.8, fill: false },
      interactive: false,
    });
  } catch(e) { console.warn('国界加载失败:', e); }
  bountLayer.addTo(map);

  // --- 底图：海岸线 ---
  let coastlineLayer = L.layerGroup();
  try {
    const coastData = await loadJSON(base + 'coastline.geojson');
    coastlineLayer = L.geoJSON(coastData, {
      style: { color: PK.boundary, weight: 0.5, opacity: 0.5, fill: false },
      interactive: false,
    });
  } catch(e) { console.warn('海岸线加载失败:', e); }
  coastlineLayer.addTo(map);

  // --- IDW 插值面 ---
  const idwData = await loadJSON(base + 'B1_IDW插值.geojson');
  const idwLayer = L.geoJSON(idwData, { style: styleIDW, onEachFeature: bindIDW });
  layerGroups['idw'] = idwLayer;
  idwLayer.addTo(map);

  // --- 核密度面 ---
  let kdeLayer = L.layerGroup(); // placeholder
  try {
    const kdeData = await loadJSON(base + 'B1_核密度分析.geojson');
    kdeLayer = L.geoJSON(kdeData, { style: styleKDE, onEachFeature: bindKDE });
  } catch(e) { console.warn('核密度分析加载失败:', e); }
  layerGroups['kde'] = kdeLayer;

  // --- OD 网络线 ---
  const odData = await loadJSON(base + 'B1_OD网络线.geojson');
  const odLayer = L.geoJSON(odData, { style: styleOD, onEachFeature: bindOD });
  layerGroups['od'] = odLayer;
  odLayer.addTo(map);
  animateODLines(odLayer);

  // --- 定价权等级点 ---
  const tierData = await loadJSON(base + 'B1_定价权等级.geojson');
  const tierLayer = L.geoJSON(tierData, {
    pointToLayer: function(feature, latlng) {
      const tl = feature.properties.tier_label || '';
      const s = TIER_STYLE[tl] || TIER_DEFAULT;
      return L.circleMarker(latlng, s);
    },
    onEachFeature: bindTier,
  });
  layerGroups['tier'] = tierLayer;
  tierLayer.addTo(map);

  // 标注
  createLabels(tierData);
  addDounanStar();

  // --- 缩放到全部数据 ---
  const allBounds = L.latLngBounds([]);
  [idwData, odData, tierData].forEach(d => {
    if (!d || !d.features) return;
    d.features.forEach(f => {
      if (!f.geometry) return;
      if (f.geometry.type === 'Point') {
        allBounds.extend([f.geometry.coordinates[1], f.geometry.coordinates[0]]);
      }
    });
  });
  if (allBounds.isValid()) map.fitBounds(allBounds, { padding: [40, 40] });

  // --- 信息栏 ---
  document.getElementById('infoBar').innerHTML =
    `要素: IDW ${idwData.features.length}面 · OD ${odData.features.length}线 · 定价权 ${tierData.features.length}点 · 核密度 8面 | 数据来源: 中国海关总署/KIFA/中国花卉协会`;

  // --- 图层切换 ---
  function bindToggle(cbId, key, legendIds) {
    const cb = document.getElementById(cbId);
    if (!cb) return;
    cb.addEventListener('change', () => {
      const lg = layerGroups[key];
      if (!lg) return;
      if (cb.checked) {
        lg.addTo(map);
        if (key === 'tier') allLabels.addTo(map);
      } else {
        map.removeLayer(lg);
        if (key === 'tier') map.removeLayer(allLabels);
      }
      updateLegends();
    });
  }

  bindToggle('toggleIDW',  'idw',  ['legendIDW']);
  bindToggle('toggleKDE', 'kde',  ['legendKDE']);
  bindToggle('toggleOD',  'od',   ['legendOD']);
  bindToggle('toggleTier','tier', ['legendTier']);

  document.getElementById('toggleLabels').addEventListener('change', function() {
    if (this.checked) { allLabels.addTo(map); }
    else              { map.removeLayer(allLabels); }
  });

  updateLegends();
}

function updateLegends() {
  const pairs = [
    ['toggleIDW',  'legendIDW'],
    ['toggleKDE', 'legendKDE'],
    ['toggleOD',  'legendOD'],
    ['toggleTier','legendTier'],
  ];
  pairs.forEach(([cbId, legId]) => {
    const cb = document.getElementById(cbId);
    const leg = document.getElementById(legId);
    if (cb && leg) leg.classList.toggle('visible', cb.checked);
  });
}

// ======================== 辅助 ========================
async function loadJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${url}`);
  return resp.json();
}

init().catch(err => {
  console.error(err);
  alert('地图加载失败，请确认 geojson/ 目录存在。\n' + err.message);
});
</script>
